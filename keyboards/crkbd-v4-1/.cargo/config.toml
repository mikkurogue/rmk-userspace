[target.'cfg(all(target_arch = "arm", target_os = "none"))']
# Use elf2uf2-rs for UF2 flashing (no probe needed)
runner = "elf2uf2-rs -d"

# Use flip-link for stack overflow protection
linker = "flip-link"

[build]
target = "thumbv6m-none-eabi"

[env]
DEFMT_LOG = "debug"
KEYBOARD_TOML_PATH = { value = "keyboard.toml", relative = true }
