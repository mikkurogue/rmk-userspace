# Corne v4.1 Standard — RMK Keyboard Configuration
#
# Pin mapping derived from QMK's crkbd/rev4_1 info.json.
# This board uses a DIRECT PIN matrix (no row/col scanning diodes).
# Split communication via half-duplex PIO serial on GP12.
# WS2812 RGB LEDs on GP10, 23 LEDs per half (46 total).
# Handedness detected via GP21 in QMK; RMK uses separate binaries.

[keyboard]
name = "Corne v4.1"
product_name = "Corne v4.1 Standard"
vendor_id = 0x4653
product_id = 0x0004
manufacturer = "foostan"
chip = "rp2040"

[layout]
rows = 8
cols = 7
layers = 5

# Layer 0: BASE (QWERTY)
# Layer 1: NUM
# Layer 2: SYM
# Layer 3: EXT
# Layer 4: FUNC
#
# 8 rows total: rows 0-3 = left (central), rows 4-7 = right (peripheral)
# 7 cols: col0=outer, col1-5=main, col6=extra inner
#
# Callum oneshot mods, combos, tri-layer handled in Rust code.
keymap = [
    # BASE
    [
        ["No",    "Q",     "W",     "E",     "R",     "T",     "No"    ],
        ["No",    "A",     "S",     "D",     "F",     "G",     "No"    ],
        ["No",    "Z",     "X",     "C",     "V",     "B",     "No"    ],
        ["No",    "No",    "No",    "MO(3)", "OSM(LShift)", "Space", "No"],
        ["No", "P", "O", "I", "U", "Y", "No"],
        ["No", "Quote", "L", "K", "J", "H", "No"],
        ["No", "Slash", "Dot", "Comma", "M", "N", "No"],
        ["No", "No", "No", "Backspace", "MO(2)", "Enter", "No"],
    ],
    # NUM
    [
        ["No",    "Kc1",   "Kc2",   "Kc3",   "Kc4",   "Kc5",   "No"    ],
        ["No",    "WM(Q, RAlt)","WM(W, RAlt)","WM(P, RAlt)","No","No","No"],
        ["No",    "No",    "No",    "No",    "Escape","Tab",   "No"    ],
        ["No",    "No",    "No",    "Delete","Tab",   "Space", "No"    ],
        ["No", "Kc0", "Kc9", "Kc8", "Kc7", "Kc6", "No"],
        ["No", "No", "Right", "Up", "Down", "Left", "No"],
        ["No", "No", "No", "No", "No", "No", "No"],
        ["No", "No", "No", "Backspace", "Backspace", "Enter", "No"],
    ],
    # SYM
    [
        ["No",    "WM(Kc1, LShift)","WM(Kc2, LShift)","WM(Kc3, LShift)","WM(Kc4, LShift)","WM(Kc5, LShift)","No"],
        ["No",    "Grave", "WM(LeftBracket, LShift)","WM(RightBracket, LShift)","WM(Kc9, LShift)","WM(Kc0, LShift)","No"],
        ["No",    "WM(Backslash, LShift)","WM(Comma, LShift)","WM(Dot, LShift)","LeftBracket","RightBracket","No"],
        ["No",    "No",    "No",    "_",     "_",     "Space", "No"    ],
        ["No", "WM(Grave, LShift)", "Equal", "WM(Kc8, LShift)", "WM(Kc7, LShift)", "WM(Kc6, LShift)", "No"],
        ["No", "OSM(LGui)", "OSM(LAlt)", "OSM(LShift)", "OSM(LCtrl)", "WM(Semicolon, LShift)", "No"],
        ["No", "Backslash", "WM(Equal, LShift)", "WM(Minus, LShift)", "Minus", "Semicolon", "No"],
        ["No", "No", "No", "_", "_", "Enter", "No"],
    ],
    # EXT
    [
        ["No",    "Escape","No",    "No",    "No",    "Insert","No"    ],
        ["No",    "OSM(LGui)","OSM(LAlt)","OSM(LShift)","OSM(LCtrl)","No","No"],
        ["No",    "No",    "Escape","No",    "Escape","Tab",   "No"    ],
        ["No",    "No",    "No",    "_",     "_",     "Space", "No"    ],
        ["No", "No", "No", "PageUp", "PageDown", "Insert", "No"],
        ["No", "Delete", "Right", "Up", "Down", "Left", "No"],
        ["No", "PrintScreen", "End", "Home", "Backspace", "No", "No"],
        ["No", "No", "No", "_", "_", "Enter", "No"],
    ],
    # FUNC
    [
        ["No",    "MediaStop","MediaPlayPause","AudioVolDown","AudioVolUp","AudioMute","No"],
        ["No",    "OSM(LGui)","OSM(LAlt)","OSM(LShift)","OSM(LCtrl)","No","No"],
        ["No",    "No",    "No",    "No",    "No",    "No",    "No"    ],
        ["No",    "No",    "No",    "_",     "_",     "Space", "No"    ],
        ["No", "F10", "F9", "F8", "F7", "No", "No"],
        ["No", "F11", "F6", "F5", "F4", "BrightnessUp", "No"],
        ["No", "F12", "F3", "F2", "F1", "BrightnessDown", "No"],
        ["No", "No", "No", "_", "_", "Enter", "No"],
    ],
]

[behavior.tri_layer]
upper = 2
lower = 3
adjust = 4

[behavior.one_shot]
timeout = "1s"

[behavior.combo]
timeout = "150ms"
combos = [
  { actions = ["D", "F"], output = "MO(1)" },
  { actions = ["J", "K"], output = "MO(1)" },
  { actions = ["B", "N"], output = "CapsWordToggle" },
]

[storage]

[host]

[split]
connection = "serial"

[split.central]
rows = 4
cols = 7
row_offset = 0
col_offset = 0
# Half-duplex PIO serial on GP12 (same pin for tx and rx)
serial = [
    { instance = "PIO0", tx_pin = "PIN_12", rx_pin = "PIN_12" },
]
[split.central.matrix]
matrix_type = "direct_pin"
direct_pins = [
    ["PIN_22", "PIN_20", "PIN_23", "PIN_26", "PIN_29", "PIN_0",  "PIN_4" ],
    ["PIN_19", "PIN_18", "PIN_24", "PIN_27", "PIN_1",  "PIN_2",  "PIN_8" ],
    ["PIN_17", "PIN_16", "PIN_25", "PIN_28", "PIN_3",  "PIN_9",  "_"     ],
    ["_",      "_",      "_",      "PIN_14", "PIN_15", "PIN_11", "_"     ],
]

[[split.peripheral]]
rows = 4
cols = 7
row_offset = 4
col_offset = 0
serial = [{ instance = "PIO0", tx_pin = "PIN_12", rx_pin = "PIN_12" }]
[split.peripheral.matrix]
matrix_type = "direct_pin"
direct_pins = [
    ["PIN_25", "PIN_27", "PIN_1", "PIN_2", "PIN_3", "PIN_9", "PIN_8"],
    ["PIN_23", "PIN_26", "PIN_28", "PIN_0", "PIN_4", "PIN_14", "PIN_11"],
    ["_", "PIN_22", "PIN_20", "PIN_29", "PIN_5", "PIN_18", "PIN_15"],
    ["_", "_", "_", "PIN_19", "PIN_17", "PIN_16", "_"],
]
